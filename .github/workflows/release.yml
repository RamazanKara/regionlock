name: release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub release
  packages: write   # push the container image + OCI chart to ghcr
  id-token: write   # keyless cosign signing

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v7
        with:
          # Pinned to the version the config is validated against (the archive
          # `format`/`formats` schema differs across v2 minors).
          version: "v2.5.1"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set a PAT with write access to RamazanKara/homebrew-tap.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Skip the Homebrew publish automatically when no tap token is set.
          HOMEBREW_SKIP: ${{ secrets.HOMEBREW_TAP_TOKEN == '' && 'true' || 'false' }}

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/regionlock
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: package and push chart to ghcr (OCI)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # OCI/GHCR repository paths must be lowercase.
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm package chart/regionlock --version "$VERSION" --app-version "$VERSION" -d /tmp/chart
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push /tmp/chart/regionlock-*.tgz "oci://ghcr.io/$OWNER/charts"
