apiVersion: v2
name: regionlock
description: Enforce data-residency on Kubernetes with tested, regulation-mapped Kyverno or OPA/Gatekeeper policies.
type: application
version: 1.1.0
appVersion: "1.1.0"
kubeVersion: ">=1.25.0-0"
keywords:
  - sovereignty
  - gdpr
  - data-residency
  - kyverno
  - compliance
  - eu
  - policy
home: https://github.com/RamazanKara/regionlock
sources:
  - https://github.com/RamazanKara/regionlock
maintainers:
  - name: Ramazan Kara
    url: https://github.com/RamazanKara
annotations:
  category: Security
  # Kyverno must be installed in the cluster (it is not bundled as a dependency
  # so operators can manage its lifecycle themselves).
  regionlock.io/requires: kyverno>=1.11
  artifacthub.io/category: security
  artifacthub.io/license: Apache-2.0
  artifacthub.io/prerelease: "false"
  artifacthub.io/links: |
    - name: source
      url: https://github.com/RamazanKara/regionlock
    - name: documentation
      url: https://ramazankara.github.io/regionlock/
  artifacthub.io/maintainers: |
    - name: Ramazan Kara
      url: https://github.com/RamazanKara
