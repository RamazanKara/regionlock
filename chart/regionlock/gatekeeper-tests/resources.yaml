# Test resources for `gator test` (and `kyverno apply`) against the rendered
# policies. Expected: exactly 17 violations. Region (10): pod-us, pod-aff-us,
# pod-none, dep-us, dep-aff-us, cj-us, dep-escape (OR escape), pod-beta-us
# (legacy label), pod-empty-in (empty In), pod-both-keys (conflicting keys). Egress (5): ext (ExternalName),
# svc-extip (externalIPs), open-egress (0.0.0.0/0), np-empty-to (allow-all),
# np-split (/1 split). PVC (2): pvc-bad (cmk + encryption). Clean: pod-eu,
# pod-aff-eu, dep-eu, pvc-good. CI-exercised.
apiVersion: v1
kind: Pod
metadata: { name: pod-us, namespace: shop }
spec:
  nodeSelector: { topology.kubernetes.io/region: us-east-1 }
  containers: [{ name: c, image: nginx }]
---
apiVersion: v1
kind: Pod
metadata: { name: pod-aff-us, namespace: shop }
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - { key: topology.kubernetes.io/region, operator: In, values: [us-east-1] }
  containers: [{ name: c, image: nginx }]
---
apiVersion: v1
kind: Pod
metadata: { name: pod-aff-eu, namespace: shop }
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - { key: topology.kubernetes.io/region, operator: In, values: [eu-central-1] }
  containers: [{ name: c, image: nginx }]
---
apiVersion: v1
kind: Service
metadata: { name: svc-extip, namespace: shop }
spec:
  type: ClusterIP
  externalIPs: [203.0.113.10]
  selector: { app: x }
  ports: [{ port: 80 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: np-empty-to, namespace: shop }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress: [{}]
---
# Controller-level coverage: a non-EU Deployment (nodeSelector) must be blocked.
apiVersion: apps/v1
kind: Deployment
metadata: { name: dep-us, namespace: shop }
spec:
  selector: { matchLabels: { app: dep-us } }
  template:
    metadata: { labels: { app: dep-us } }
    spec:
      nodeSelector: { topology.kubernetes.io/region: us-east-1 }
      containers: [{ name: c, image: nginx }]
---
# A non-EU Deployment pinned via nodeAffinity must be blocked.
apiVersion: apps/v1
kind: Deployment
metadata: { name: dep-aff-us, namespace: shop }
spec:
  selector: { matchLabels: { app: dep-aff-us } }
  template:
    metadata: { labels: { app: dep-aff-us } }
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - { key: topology.kubernetes.io/region, operator: In, values: [us-west-2] }
      containers: [{ name: c, image: nginx }]
---
# A compliant EU Deployment must be admitted.
apiVersion: apps/v1
kind: Deployment
metadata: { name: dep-eu, namespace: shop }
spec:
  selector: { matchLabels: { app: dep-eu } }
  template:
    metadata: { labels: { app: dep-eu } }
    spec:
      nodeSelector: { topology.kubernetes.io/region: eu-central-1 }
      containers: [{ name: c, image: nginx }]
---
# The deepest pod-spec path: a non-EU CronJob must be blocked.
apiVersion: batch/v1
kind: CronJob
metadata: { name: cj-us, namespace: shop }
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector: { topology.kubernetes.io/region: us-east-1 }
          restartPolicy: Never
          containers: [{ name: c, image: nginx }]
---
# OR escape: one term names an EU region, a sibling term has NO region constraint,
# so the pod can schedule anywhere (OR semantics); must be blocked (not a guaranteed pin).
apiVersion: apps/v1
kind: Deployment
metadata: { name: dep-escape, namespace: shop }
spec:
  selector: { matchLabels: { app: dep-escape } }
  template:
    metadata: { labels: { app: dep-escape } }
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - { key: topology.kubernetes.io/region, operator: In, values: [eu-central-1] }
              - matchExpressions:
                  - { key: disktype, operator: In, values: [ssd] }
      containers: [{ name: c, image: nginx }]
---
# Legacy beta region label, non-EU; must be blocked (engines recognize both keys).
apiVersion: v1
kind: Pod
metadata: { name: pod-beta-us, namespace: shop }
spec:
  nodeSelector: { failure-domain.beta.kubernetes.io/region: us-east-1 }
  containers: [{ name: c, image: nginx }]
---
# Both region keys set to DIFFERENT values are ANDed, so the pod can land on the
# non-EU (beta) value, so it must be blocked (not passed on the EU topology value).
apiVersion: v1
kind: Pod
metadata: { name: pod-both-keys, namespace: shop }
spec:
  nodeSelector:
    topology.kubernetes.io/region: eu-west-1
    failure-domain.beta.kubernetes.io/region: us-east-1
  containers: [{ name: c, image: nginx }]
---
# A region In-expression with an EMPTY values list pins nothing → not declared.
apiVersion: v1
kind: Pod
metadata: { name: pod-empty-in, namespace: shop }
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - { key: topology.kubernetes.io/region, operator: In, values: [] }
  containers: [{ name: c, image: nginx }]
---
# Split default route: 0.0.0.0/1 + 128.0.0.0/1 cover the whole space but neither
# ends in /0; must still be blocked via the /1 check.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: np-split, namespace: shop }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock: { cidr: 0.0.0.0/1 }
        - ipBlock: { cidr: 128.0.0.0/1 }
---
apiVersion: v1
kind: Pod
metadata: { name: pod-none, namespace: shop }
spec:
  containers: [{ name: c, image: nginx }]
---
apiVersion: v1
kind: Pod
metadata: { name: pod-eu, namespace: shop }
spec:
  nodeSelector: { topology.kubernetes.io/region: eu-central-1 }
  containers: [{ name: c, image: nginx }]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: pvc-bad, namespace: shop }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 1Gi } } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-good
  namespace: shop
  labels: { regionlock.io/encrypted: "true" }
  annotations: { regionlock.io/cmk-key-id: arn:kms:key/1 }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 1Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: ext, namespace: shop }
spec: { type: ExternalName, externalName: x.us.example.com }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: open-egress, namespace: shop }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress: [{ to: [{ ipBlock: { cidr: 0.0.0.0/0 } }] }]
