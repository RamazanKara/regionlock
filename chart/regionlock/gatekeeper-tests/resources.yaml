# Test resources for `gator test` against the rendered Gatekeeper policies.
# Expected: exactly 9 violations. Violating: pod-us (nodeSelector non-EU),
# pod-none (no region), pod-aff-us (nodeAffinity non-EU), pvc-bad (cmk+enc = 2),
# ext (ExternalName), svc-extip (externalIPs), open-egress (0.0.0.0/0),
# np-empty-to (allow-all). Clean: pod-eu, pod-aff-eu, pvc-good.
# Exercised by the `gatekeeper` CI job.
apiVersion: v1
kind: Pod
metadata: { name: pod-us, namespace: shop }
spec:
  nodeSelector: { topology.kubernetes.io/region: us-east-1 }
  containers: [{ name: c, image: nginx }]
---
apiVersion: v1
kind: Pod
metadata: { name: pod-aff-us, namespace: shop }
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - { key: topology.kubernetes.io/region, operator: In, values: [us-east-1] }
  containers: [{ name: c, image: nginx }]
---
apiVersion: v1
kind: Pod
metadata: { name: pod-aff-eu, namespace: shop }
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - { key: topology.kubernetes.io/region, operator: In, values: [eu-central-1] }
  containers: [{ name: c, image: nginx }]
---
apiVersion: v1
kind: Service
metadata: { name: svc-extip, namespace: shop }
spec:
  type: ClusterIP
  externalIPs: [203.0.113.10]
  selector: { app: x }
  ports: [{ port: 80 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: np-empty-to, namespace: shop }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress: [{}]
---
# Controller-level coverage: a non-EU Deployment (nodeSelector) must be blocked.
apiVersion: apps/v1
kind: Deployment
metadata: { name: dep-us, namespace: shop }
spec:
  selector: { matchLabels: { app: dep-us } }
  template:
    metadata: { labels: { app: dep-us } }
    spec:
      nodeSelector: { topology.kubernetes.io/region: us-east-1 }
      containers: [{ name: c, image: nginx }]
---
# A non-EU Deployment pinned via nodeAffinity must be blocked.
apiVersion: apps/v1
kind: Deployment
metadata: { name: dep-aff-us, namespace: shop }
spec:
  selector: { matchLabels: { app: dep-aff-us } }
  template:
    metadata: { labels: { app: dep-aff-us } }
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - { key: topology.kubernetes.io/region, operator: In, values: [us-west-2] }
      containers: [{ name: c, image: nginx }]
---
# A compliant EU Deployment must be admitted.
apiVersion: apps/v1
kind: Deployment
metadata: { name: dep-eu, namespace: shop }
spec:
  selector: { matchLabels: { app: dep-eu } }
  template:
    metadata: { labels: { app: dep-eu } }
    spec:
      nodeSelector: { topology.kubernetes.io/region: eu-central-1 }
      containers: [{ name: c, image: nginx }]
---
# The deepest pod-spec path: a non-EU CronJob must be blocked.
apiVersion: batch/v1
kind: CronJob
metadata: { name: cj-us, namespace: shop }
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector: { topology.kubernetes.io/region: us-east-1 }
          restartPolicy: Never
          containers: [{ name: c, image: nginx }]
---
apiVersion: v1
kind: Pod
metadata: { name: pod-none, namespace: shop }
spec:
  containers: [{ name: c, image: nginx }]
---
apiVersion: v1
kind: Pod
metadata: { name: pod-eu, namespace: shop }
spec:
  nodeSelector: { topology.kubernetes.io/region: eu-central-1 }
  containers: [{ name: c, image: nginx }]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: pvc-bad, namespace: shop }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 1Gi } } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-good
  namespace: shop
  labels: { regionlock.io/encrypted: "true" }
  annotations: { regionlock.io/cmk-key-id: arn:kms:key/1 }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 1Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: ext, namespace: shop }
spec: { type: ExternalName, externalName: x.us.example.com }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: open-egress, namespace: shop }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress: [{ to: [{ ipBlock: { cidr: 0.0.0.0/0 } }] }]
