{{- if and (has .Values.engine (list "gatekeeper" "both")) .Values.policies.euRegionPlacement }}
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: regionlockeuregion
  labels: {{- include "regionlock.labels" . | nindent 4 }}
  annotations:
    regionlock.io/rule-id: eu-region-placement
    regionlock.io/articles: "GDPR Art. 44; GDPR Art. 45; EU Data Act Art. 32"
spec:
  crd:
    spec:
      names:
        kind: RegionlockEuRegion
      validation:
        openAPIV3Schema:
          type: object
          properties:
            requireRegion:
              type: boolean
            allowedRegions:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package regionlockeuregion

        # nodeSelector region pin outside the EU.
        violation[{"msg": msg}] {
          region := input.review.object.spec.nodeSelector["topology.kubernetes.io/region"]
          not region_allowed(region)
          msg := sprintf("BLOCKED: non-EU region \"%v\" (nodeSelector) violates EU data-residency policy [GDPR Art. 44]", [region])
        }

        # required nodeAffinity In-term pinning region outside the EU.
        violation[{"msg": msg}] {
          region := affinity_region_values[_]
          not region_allowed(region)
          msg := sprintf("BLOCKED: non-EU region \"%v\" (nodeAffinity) violates EU data-residency policy [GDPR Art. 44]", [region])
        }

        # no positive region pin at all (neither nodeSelector nor an In-affinity term).
        violation[{"msg": msg}] {
          input.parameters.requireRegion
          not has_nodeselector_region
          count(affinity_region_values) == 0
          msg := "BLOCKED: no EU region declared via topology.kubernetes.io/region [GDPR Art. 44]"
        }

        has_nodeselector_region {
          input.review.object.spec.nodeSelector["topology.kubernetes.io/region"]
        }

        affinity_region_values[v] {
          term := input.review.object.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[_]
          expr := term.matchExpressions[_]
          expr.key == "topology.kubernetes.io/region"
          expr.operator == "In"
          v := expr.values[_]
        }

        region_allowed(region) {
          input.parameters.allowedRegions[_] == region
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: RegionlockEuRegion
metadata:
  name: regionlock-eu-region-placement
  labels: {{- include "regionlock.labels" . | nindent 4 }}
spec:
  enforcementAction: {{ include "regionlock.gatekeeperAction" . }}
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    {{- with .Values.excludeNamespaces }}
    excludedNamespaces:
    {{- toYaml . | nindent 6 }}
    {{- end }}
  parameters:
    requireRegion: {{ .Values.requireRegion }}
    allowedRegions:
    {{- toYaml .Values.euRegions | nindent 6 }}
{{- end }}
