{{- if and (has .Values.engine (list "kyverno" "both")) .Values.policies.euRegionPlacement }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: regionlock-eu-region-placement
  labels: {{- include "regionlock.labels" . | nindent 4 }}
  annotations:
    regionlock.io/rule-id: eu-region-placement
    policies.kyverno.io/title: EU Region Placement
    policies.kyverno.io/severity: high
    policies.kyverno.io/category: EU Data Residency
    policies.kyverno.io/subject: Pod
    regionlock.io/articles: "GDPR Art. 44; GDPR Art. 45; EU Data Act Art. 32"
    policies.kyverno.io/description: >-
      Workloads must be pinned to an allow-listed EU cloud region via the
      topology.kubernetes.io/region label. Unconstrained or non-EU placement can
      schedule pods — and the personal data they process — outside the EEA.
spec:
  validationFailureAction: {{ .Values.enforcementAction }}
  background: true
  rules:
    - name: region-nodeselector-must-be-eu
      match:
        any:
          - resources:
              kinds:
                - Pod
      {{- include "regionlock.exclude" .Values.excludeNamespaces | nindent 6 }}
      preconditions:
        all:
          - key: {{ include "regionlock.regionExprOrEmpty" . | quote }}
            operator: NotEquals
            value: ""
      validate:
        message: >-
          BLOCKED: non-EU region on nodeSelector (topology.kubernetes.io/region / failure-domain.beta.kubernetes.io/region) violates EU data-residency policy [GDPR Art. 44]
        deny:
          conditions:
            all:
              - key: {{ include "regionlock.regionNodeSelectorValues" . | quote }}
                operator: AnyNotIn
                value:
                {{- toYaml .Values.euRegions | nindent 18 }}
    - name: region-nodeaffinity-must-be-eu
      match:
        any:
          - resources:
              kinds:
                - Pod
      {{- include "regionlock.exclude" .Values.excludeNamespaces | nindent 6 }}
      validate:
        message: >-
          BLOCKED: nodeAffinity pins a non-EU region ("{{ include "regionlock.regionAffinityValues" . }}") violating EU data-residency policy [GDPR Art. 44]
        deny:
          conditions:
            all:
              - key: {{ include "regionlock.regionAffinityValues" . | quote }}
                operator: AnyNotIn
                value:
                {{- toYaml .Values.euRegions | nindent 18 }}
{{- if .Values.requireRegion }}
    - name: region-must-be-declared
      match:
        any:
          - resources:
              kinds:
                - Pod
      {{- include "regionlock.exclude" .Values.excludeNamespaces | nindent 6 }}
      validate:
        message: >-
          BLOCKED: workload is not guaranteed to stay in an EU region — pin topology.kubernetes.io/region to an EU region via nodeSelector or on EVERY nodeAffinity term [GDPR Art. 44]
        deny:
          conditions:
            # No nodeSelector region pin, AND either no affinity terms or at least
            # one affinity term is region-unconstrained (an OR escape hatch).
            all:
              - key: {{ include "regionlock.regionExprOrEmpty" . | quote }}
                operator: Equals
                value: ""
            any:
              - key: {{ include "regionlock.termsCount" . | quote }}
                operator: Equals
                value: 0
              - key: {{ include "regionlock.regionTermsCount" . | quote }}
                operator: NotEquals
                value: {{ include "regionlock.termsCount" . | quote }}
{{- end }}
{{- end }}
