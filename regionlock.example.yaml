# Example Regionlock CLI config. Pass with:  regionlock report --config regionlock.yaml
#
# Every field is optional; unset fields fall back to the selected ruleset's
# defaults (see: regionlock policies --regulation <id>).

# Cloud region identifiers considered in-territory (replace the ruleset's list).
# Omit this to inherit the region allow-list of the --regulation you pick.
euRegions:
  - eu-central-1
  - eu-west-1
  - europe-west3
  - westeurope

# Declare the cluster's single region. On a single-region cluster this lets
# unpinned workloads pass (while an explicit non-EU pin still fails), so you are
# not forced to label every workload. Leave empty for per-workload pinning.
clusterRegion: ""

# Fail workloads that declare no region constraint at all (ignored when
# clusterRegion is set).
requireRegion: true

# Flag workload namespaces that have no egress-restricting NetworkPolicy
# (Kubernetes defaults to allow-all egress). Opt-in.
requireEgressPolicy: false

# Permit Service type=ExternalName (off by default).
allowExternalName: false

# Permit Service spec.externalIPs (off by default; independent of the above).
allowExternalIPs: false

# PVC annotation that references a customer-managed key. A PVC also passes if it
# uses a StorageClass whose parameters carry a CMK (kmsKeyId / diskEncryptionSetID
# / disk-encryption-kms-key).
cmkAnnotation: regionlock.io/cmk-key-id

# PVC label asserting encryption at rest (value must be "true"). A PVC also passes
# if it uses a StorageClass with `encrypted: "true"` or a CMK parameter.
encryptionLabel: regionlock.io/encrypted

# Documented, time-boxed exceptions. A waiver turns a matching *failure* into a
# "waived" result (recorded in the report, not counted as a violation) until it
# expires. `rule`, `expires` (YYYY-MM-DD) and `reason` are required; empty
# kind/name/namespace act as wildcards. Waivers are deliberately fail-closed: an
# expired waiver never suppresses a violation, and a malformed one is a hard error.
waivers:
  - rule: eu-region-placement
    namespace: analytics
    expires: 2026-12-31
    reason: "Approved DR failover to us-east-1 while eu-west-1 capacity is provisioned (ticket SEC-1234)."
  # - rule: customer-managed-key
  #   kind: PersistentVolumeClaim
  #   name: legacy-cache
  #   expires: 2026-09-30
  #   reason: "Legacy volume scheduled for migration in Q3."
