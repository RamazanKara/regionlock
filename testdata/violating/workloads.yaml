apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: shop
spec:
  replicas: 3
  selector:
    matchLabels: { app: checkout-api }
  template:
    metadata:
      labels: { app: checkout-api }
    spec:
      # Pinned OUTSIDE the EU — a third-country transfer.
      nodeSelector:
        topology.kubernetes.io/region: us-east-1
      containers:
        - name: api
          image: ghcr.io/example/checkout:1.4.0
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sessions
  namespace: shop
spec:
  serviceName: sessions
  replicas: 1
  selector:
    matchLabels: { app: sessions }
  template:
    metadata:
      labels: { app: sessions }
    spec:
      # No region constraint at all — placement is unconstrained.
      containers:
        - name: redis
          image: redis:7
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: orders-data
  namespace: shop
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
  # No customer-managed key, no encryption-at-rest declaration.
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-proxy
  namespace: shop
spec:
  type: ExternalName
  externalName: metrics.us-analytics.example.com
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-egress
  namespace: shop
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
